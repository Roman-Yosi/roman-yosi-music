<!DOCTYPE html>
<html lang="id">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roman Yosi Music</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial, sans-serif;
      text-align:center;
    }

    .hero{
      padding:80px 20px;
    }

    h1{
      font-size:50px;
      margin-bottom:10px;
    }

    p{

      padding:15px 30px;
      background:#06b6d4;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
    }

    .btn:hover{
      background:#0891b2;
    }

</head>
<body>

  <div class="hero">
    <h1>Roman Yosi Music</h1>

    <p>
      Selamat datang di website resmi Roman Yosi
    </p>

    <a class="btn" href="https://youtube.com/@romanyosi">

  </div>

</html>
