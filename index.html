<div class="container">

</div>

  © 2026 Roman Yosi Official
</footer>

<script>
const channels = [
  "UCUTSzBr1CERM8lB9OTCwrQg",
  "UCMnig2Zwu_aHwu9LS_2XsgA",
  "UCYQsajxT6ehvHUjalKRT21A"
];

async function loadYT() {
  const container = document.getElementById("yt-feed");
  let allVideos = [];

  try {
    for (const id of channels) {
      try {
        const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
        const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

        const res = await fetch(api);
        const data = await res.json();

        if (data && data.items) {
          allVideos = allVideos.concat(data.items);
        }
      } catch (e) {}
    }

    if (allVideos.length === 0) {
      container.innerHTML = "⚠️ Tidak ada video ditemukan";
      return;
    }

    allVideos.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    let html = "";

    allVideos.slice(0, 6).forEach(v => {
      html += `
        <div class="video-card">
          <img src="${v.thumbnail || ''}">
          <p><a href="${v.link}" target="_blank">▶ ${v.title}</a></p>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "⚠️ Gagal load YouTube feed";
  }
}

loadYT();
</script>
