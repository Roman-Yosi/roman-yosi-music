<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="favicon.ico">
  <title>Roman Yosi Official</title>

  <meta name="description" content="Roman Yosi Official - Musisi dan creator Indonesia">
  <meta name="robots" content="index, follow">

  <link rel="canonical" href="https://roman-yosi.github.io/roman-yosi-music/">

  <meta property="og:title" content="Roman Yosi Official">
  <meta property="og:description" content="Musisi dan creator Indonesia">
  <meta property="og:type" content="website">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      text-align:center;
    }

    header{
      padding:40px;
      background:#111;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:#1b1b1b;
      padding:20px;
      margin:15px 0;
      border-radius:12px;
      text-align:left;
    }

    .video-card{
      background:#111;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
    }

    img{
      width:100%;
      border-radius:10px;
    }

    a{color:#00e676;text-decoration:none;}
  </style>
</head>

<body>

<header>
  <h1>Roman Yosi Official</h1>
  <p>Independent Music Artist</p>
</header>

<div class="container">

  <div class="card">
    <h2>🎵 YouTube Feed</h2>
    <div id="yt-feed">Loading...</div>
  </div>

</div>

<footer>
  © 2026 Roman Yosi
</footer>

<script>
const channels = [
  "UCUTSzBr1CERM8lB9OTCwrQg",
  "UCMnig2Zwu_aHwu9LS_2XsgA",
  "UCYQsajxT6ehvHUjalKRT21A"
];

async function loadYT() {
  let videos = [];

  try {
    for (const id of channels) {
      const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
      const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;

      const res = await fetch(api);
      const data = await res.json();

      if (data.items) {
        videos = videos.concat(data.items);
      }
    }

    videos.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    let html = "";

    if (videos.length === 0) {
      document.getElementById("yt-feed").innerHTML =
        "⚠️ Tidak ada video ditemukan";
      return;
    }

    videos.slice(0, 6).forEach(v => {
      html += `
        <div class="video-card">
          <img src="${v.thumbnail}">
          <p><a href="${v.link}" target="_blank">▶ ${v.title}</a></p>
        </div>
      `;
    });

    document.getElementById("yt-feed").innerHTML = html;

  } catch (e) {
    document.getElementById("yt-feed").innerHTML =
      "⚠️ Gagal memuat YouTube feed";
  }
}

loadYT();
</script>

</body>
</html>
