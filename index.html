<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <title>Roman Yosi Official</title>

  <meta name="description" content="Roman Yosi Official - Musisi dan creator Indonesia. Dengarkan karya musik terbaru di Spotify, YouTube, dan TikTok.">
  <meta name="robots" content="index, follow">

  <link rel="canonical" href="https://roman-yosi.github.io/roman-yosi-music/">

  <meta property="og:title" content="Roman Yosi Official">
  <meta property="og:description" content="Musisi dan creator Indonesia - Roman Yosi Official">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://roman-yosi.github.io/roman-yosi-music/">
  <meta property="og:image" content="https://raw.githubusercontent.com/Roman-Yosi/Poto-roman-yosi/main/final-image%20(4).jpg">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "Roman Yosi",
    "alternateName": "Roman Yosi Official",
    "url": "https://roman-yosi.github.io/roman-yosi-music/",
    "image": "https://raw.githubusercontent.com/Roman-Yosi/Poto-roman-yosi/main/final-image%20(4).jpg",
    "description": "Indonesian independent music artist specializing in emotional pop and storytelling music.",
    "genre": "Indie Pop",
    "sameAs": [
      "https://open.spotify.com/artist/3j2wzsjuf9JcBgRZxP44dJ",
      "https://www.youtube.com/@romanyosi",
      "https://www.youtube.com/@romanyosimusic",
      "https://www.tiktok.com/@romanyosi",
      "https://www.instagram.com/roman.yosi",
      "https://www.wikidata.org/wiki/Q139959645",
      "https://musicbrainz.org/artist/7193887"
    ]
  }
  </script>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      color:white;
      text-align:center;
    }

    header{
      padding:60px 20px;
      background:linear-gradient(135deg,#111,#222);
    }

    h1{font-size:42px;margin-bottom:10px;}

    .badge{
      display:inline-block;
      background:#1db954;
      color:white;
      padding:4px 10px;
      border-radius:20px;
      font-size:13px;
      margin-left:8px;
    }

    .container{
      padding:30px 20px;
      max-width:900px;
      margin:auto;
    }

    .card{
      background:#1b1b1b;
      padding:25px;
      margin:20px 0;
      border-radius:15px;
      text-align:left;
    }

    img.profile{
      width:180px;
      height:180px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid #00e676;
      margin-top:20px;
    }

    .video-card{
      background:#111;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    .video-card img{
      width:100%;
      border-radius:10px;
    }

    a{color:#00e676;text-decoration:none;}
  </style>
</head>

<body>

<header>
  <h1>Roman Yosi Official <span class="badge">✓ Official Artist</span></h1>
  <p>Musisi • Creator • Independent Artist</p>

  <img class="profile" src="https://raw.githubusercontent.com/Roman-Yosi/Poto-roman-yosi/main/final-image%20(4).jpg">
</header>

<div class="container">

  <div class="card">
    <h2>🎵 Rilisan Terbaru (YouTube Feed)</h2>
    <div id="yt-feed">Loading...</div>
  </div>

</div>

<footer>
  © 2026 Roman Yosi Official
</footer>

<script>
const channels = [
  "UCUTSzBr1CERM8lB9OTCwrQg",
  "UCMnig2Zwu_aHwu9LS_2XsgA",
  "UCYQsajxT6ehvHUjalKRT21A"
];

async function loadYT() {
  const container = document.getElementById("yt-feed");
  let allVideos = [];

  try {
    for (const id of channels) {
      try {
        const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
        const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

        const res = await fetch(api);
        const data = await res.json();

        if (data && data.items) {
          allVideos = allVideos.concat(data.items);
        }
      } catch (e) {
        console.log("Channel error:", id);
      }
    }

    if (allVideos.length === 0) {
      container.innerHTML = "⚠️ Belum ada video";
      return;
    }

    allVideos.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    let html = "";

    allVideos.slice(0, 6).forEach(item => {
      html += `
        <div class="video-card">
          <img src="${item.thumbnail || ''}">
          <p><a href="${item.link}" target="_blank">▶ ${item.title}</a></p>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "⚠️ YouTube feed tidak dapat dimuat";
  }
}

loadYT();
</script>

</body>
</html>
