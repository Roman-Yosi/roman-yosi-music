<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Roman Yosi Official</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      text-align:center;
    }

    header{
      padding:40px;
      background:#111;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .card{
      background:#1b1b1b;
      padding:20px;
      margin:15px 0;
      border-radius:12px;
      text-align:left;
    }

    .video-card{
      background:#111;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
    }

    img{
      width:100%;
      border-radius:10px;
    }

    a{color:#00e676;text-decoration:none;}
  </style>
</head>

<body>

<header>
  <h1>Roman Yosi Official</h1>
  <p>Independent Music Artist</p>
</header>

<div class="container">

  <div class="card">
    <h2>🎵 YouTube Feed</h2>
    <div id="yt-feed">⏳ Loading...</div>
  </div>

</div>

<footer>
  © 2026 Roman Yosi
</footer>

<script>
const channels = [
  "UCUTSzBr1CERM8lB9OTCwrQg",
  "UCMnig2Zwu_aHwu9LS_2XsgA",
  "UCYQsajxT6ehvHUjalKRT21A"
];

async function loadYT() {
  const container = document.getElementById("yt-feed");
  let videos = [];

  container.innerHTML = "⏳ Mengambil video...";

  try {
    for (const id of channels) {

      const rss = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;

      // fallback API (lebih stabil dari rss2json)
      const api = `https://api.allorigins.win/raw?url=${encodeURIComponent(rss)}`;

      const res = await fetch(api);

      if (!res.ok) continue;

      const text = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");

      const entries = xml.querySelectorAll("entry");

      entries.forEach(e => {
        const title = e.querySelector("title")?.textContent;
        const link = e.querySelector("link")?.getAttribute("href");
        const date = e.querySelector("published")?.textContent;

        const thumb =
          e.querySelector("media\\:thumbnail")?.getAttribute("url") || "";

        videos.push({ title, link, date, thumb });
      });
    }

    // kalau kosong → tetap tampil UI
    if (videos.length === 0) {
      container.innerHTML = "⚠️ Belum ada video atau feed tidak tersedia";
      return;
    }

    videos.sort((a,b) => new Date(b.date) - new Date(a.date));

    let html = "";

    videos.slice(0,6).forEach(v => {
      html += `
        <div class="video-card">
          ${v.thumb ? `<img src="${v.thumb}">` : ""}
          <p><a href="${v.link}" target="_blank">▶ ${v.title}</a></p>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (err) {
    console.log(err);
    container.innerHTML =
      "❌ Feed gagal dimuat (cek koneksi atau API)";
  }
}

loadYT();
</script>

</body>
</html>
