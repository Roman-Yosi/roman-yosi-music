<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Roman Yosi Official</title>

  <meta name="description" content="Roman Yosi Official - Musisi dan creator Indonesia.">
  <meta name="robots" content="index, follow">

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      color:white;
      text-align:center;
    }

    header{
      padding:50px 20px;
      background:linear-gradient(135deg,#111,#222);
    }

    h1{font-size:40px;margin:0;}

    .badge{
      display:inline-block;
      background:#1db954;
      color:white;
      padding:4px 10px;
      border-radius:20px;
      font-size:12px;
      margin-left:8px;
    }

    nav{
      margin-top:15px;
    }

    nav a{
      color:#00e676;
      margin:0 10px;
      text-decoration:none;
      font-weight:bold;
    }

    nav a:hover{opacity:0.7;}

    .social{
      margin-top:10px;
    }

    .social a{
      margin:0 8px;
      color:#fff;
      font-size:14px;
    }

    .container{
      padding:25px;
      max-width:900px;
      margin:auto;
    }

    .card{
      background:#1b1b1b;
      padding:20px;
      margin:15px 0;
      border-radius:12px;
      text-align:left;
    }

    .video-card{
      background:#111;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
    }

    .video-card img{
      width:100%;
      border-radius:8px;
    }

    a{color:#00e676;text-decoration:none;}

    footer{
      padding:20px;
      font-size:13px;
      opacity:0.7;
    }
  </style>
</head>

<body>

<header>
  <h1>Roman Yosi Official <span class="badge">✓ Artist</span></h1>
  <p>Musisi • Creator • Independent Artist</p>

  <!-- MENU -->
  <nav>
    <a href="#">Home</a>
    <a href="#">Music</a>
    <a href="#">About</a>
    <a href="#">Press</a>
  </nav>

  <!-- SOCIAL MENU -->
  <div class="social">
    <a href="https://open.spotify.com/artist/3j2wzsjuf9JcBgRZxP44dJ" target="_blank">Spotify</a>
    <a href="https://www.youtube.com/@romanyosi" target="_blank">YouTube</a>
    <a href="https://www.tiktok.com/@romanyosi" target="_blank">TikTok</a>
    <a href="https://www.instagram.com/roman.yosi" target="_blank">Instagram</a>
  </div>
</header>

<div class="container">

  <div class="card">
    <h2>🎵 YouTube Feed</h2>
    <div id="yt-feed">Loading...</div>
  </div>

</div>

<footer>
  © 2026 Roman Yosi Official
</footer>

<script>
const channels = [
  "UCUTSzBr1CERM8lB9OTCwrQg",
  "UCMnig2Zwu_aHwu9LS_2XsgA",
  "UCYQsajxT6ehvHUjalKRT21A"
];

async function loadYT() {
  const container = document.getElementById("yt-feed");
  let allVideos = [];

  try {
    for (const id of channels) {
      const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
      const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url);

      const res = await fetch(api);
      const data = await res.json();

      if (data && data.items) {
        allVideos = allVideos.concat(data.items);
      }
    }

    allVideos.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    if (allVideos.length === 0) {
      container.innerHTML = "⚠️ Tidak ada video";
      return;
    }

    let html = "";

    allVideos.slice(0, 6).forEach(v => {
      html += `
        <div class="video-card">
          <img src="${v.thumbnail}">
          <p><a href="${v.link}" target="_blank">▶ ${v.title}</a></p>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch (e) {
    container.innerHTML = "⚠️ Gagal load YouTube feed";
  }
}

loadYT();
</script>

</body>
</html>
